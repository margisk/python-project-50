name: Python CI

on:
  - push
  - pull_request

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Install deps
        run: |
          pip install uv
          uv sync
      - name: Run linter and tests
        run: |
          uv run ruff check
          uv run pytest
      -name: Test coverage
        run: |
          uv run pytest --cov=gendiff --cov-report xml
